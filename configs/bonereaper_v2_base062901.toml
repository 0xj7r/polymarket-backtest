# BonereaperV2 "base062901" profile
# Identical strategy/lane knobs to bonereaper_v2_leader.toml, but pins
# replay_sample_ms = 1000 to match the 20260529T062901Z portfolio-grid baseline
# (1s sampling, "fast + good results"). Sizing is NOT set here: the launcher
# passes the 062901 production sizing on the CLI (clip_fraction_of_equity 0.015,
# max_clip_usdc 30, max_per_market_exposure_usdc 250, max_per_market_exposure_frac
# 0.12, kelly 0.5, clip_drawdown 0.2/0.4, taker_latency_ms 500). The profile
# struct carries no sizing fields, so CLI sizing is authoritative.

[strategy]
name = "bonereaper_v2"

[bonereaper_v2]
# 1s sampling to match the 062901 baseline (raw-event fidelity was the bug).
replay_sample_ms = 1000

# Core
disable_internal_model_gates = false
min_composite_direction = 0.10

# Late confirmation (kept modest)
late_clip_frac = 1.0
late_max_fires = 3
late_confirm_min_model_edge = 0.02

# High-skew load lane
high_skew_clip_frac = 0.60
high_skew_max_clips = 5
high_skew_max_whipsaw_score = 0.75

# === Late favourite loading (the PnL engine) ===
late_favourite_start_secs = 180.0
late_favourite_threshold = 0.22
late_favourite_min_ask = 0.70
late_favourite_max_ask = 0.97
late_favourite_clip_frac = 1.0
late_favourite_high_cert_clip_frac = 1.0
late_favourite_high_cert_full_clip_edge = 0.04
late_favourite_max_clips = 12
late_favourite_sweep_depth = 7

# Model gates for late favourite
late_favourite_min_model_confidence = 0.68
late_favourite_max_model_risk = 0.72
late_favourite_min_model_side_p = 0.62
late_favourite_min_model_edge = 0.03
late_favourite_high_cert_min_model_edge = 0.02

# Fragile high-cert taper (key part of the "leader" variant)
late_favourite_fragile_high_cert_ask = 0.923
late_favourite_fragile_high_cert_max_edge = 0.005
late_favourite_fragile_high_cert_max_path_efficiency = 0.50
late_favourite_fragile_high_cert_size_frac = 0.50

# Range throttling (soft78)
late_favourite_range_soft_throttle = 0.78
late_favourite_range_hard_throttle = 0.98
late_favourite_range_extra_edge = 0.03
late_favourite_range_extra_confidence = 0.08

# Whipsaw / reversal guards (still active)
late_favourite_max_whipsaw_score = 0.75
late_favourite_max_reversal_pressure = 1.0
late_favourite_min_path_efficiency = 0.0
late_confirm_min_realized_vol_180s_bps = 0.0
high_skew_min_realized_vol_180s_bps = 0.0
late_favourite_min_realized_vol_180s_bps = 0.0

# === Convex tail (cheap opposite side) ===
tail_clip_frac = 0.10
tail_max_clips = 3
tail_sweep_depth = 3
tail_min_ask = 0.01
tail_max_ask = 0.10
tail_min_seconds_to_close = 10.0
tail_min_favourite_unrealized_edge = 0.0
tail_extreme_threshold = 0.30
tail_min_skew_step = 0.02

# The higher tail coverage that was part of the strong historical result
tail_target_favourite_loss_coverage_frac = 0.50
tail_budget_favourite_spend_frac = 0.20
tail_budget_favourite_upside_frac = 0.25

# Reversal boost window for tail
tail_reversal_coverage_frac = 0.0   # start conservative; can raise
tail_reversal_min_seconds_to_close = 10.0
tail_reversal_max_seconds_to_close = 35.0
tail_reversal_min_favourite_ask = 0.895

# === BTC regime risk weights (new in 696baafa) ===
model_btc_whipsaw_risk_weight = 0.16
model_btc_path_inefficiency_risk_weight = 0.10
model_btc_reversal_pressure_risk_weight = 0.12

# Portfolio / sizing (usually passed on CLI, but can be set here too)
# clip_fraction_of_equity and max_clip_usdc are typically CLI for flexibility during grids.
