# Lightweight smoke profile for quick local validation (100-500 markets)
[strategy]
name = "bonereaper_v2"

[bonereaper_v2]
disable_internal_model_gates = false

# Use current best-known settings but lighter for speed
late_favourite_max_clips = 8
late_favourite_sweep_depth = 5
tail_max_clips = 2

# Keep the important new features
late_favourite_fragile_high_cert_ask = 0.923
late_favourite_fragile_high_cert_max_edge = 0.005
late_favourite_fragile_high_cert_max_path_efficiency = 0.50
late_favourite_range_soft_throttle = 0.78

# Current BTC regime risk defaults
model_btc_whipsaw_risk_weight = 0.16
model_btc_path_inefficiency_risk_weight = 0.10
model_btc_reversal_pressure_risk_weight = 0.12

# Conservative tail for smoke
tail_target_favourite_loss_coverage_frac = 0.30
tail_budget_favourite_spend_frac = 0.15